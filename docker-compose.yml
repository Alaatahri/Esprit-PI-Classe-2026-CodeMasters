services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ai-service:
    build:
      context: ./ai-expert-matching
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      MONGODB_URI: mongodb://mongo:27017/bmp-tn
      AI_SERVICE_URL: http://ai-service:8001
    depends_on:
      mongo:
        condition: service_healthy
      ai-service:
        condition: service_started

volumes:
  mongo_data:
